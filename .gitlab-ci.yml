# quicue.ca — GitLab CI (mirrors GitHub Actions)
# Uses just recipes as the single source of truth.

stages:
  - validate
  - test

variables:
  CUE_VERSION: "0.15.4"
  JUST_VERSION: "1.46.0"
  CUE_REGISTRY: "none"

.cue-just-setup:
  image: golang:1.21-alpine
  tags: [infra]
  before_script:
    - apk add --no-cache curl bash make git sed
    - |
      if [ ! -f /usr/local/bin/cue ]; then
        curl -sSL "https://github.com/cue-lang/cue/releases/download/v${CUE_VERSION}/cue_v${CUE_VERSION}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin
      fi
    - |
      if [ ! -f /usr/local/bin/just ]; then
        curl -sSL "https://github.com/casey/just/releases/download/${JUST_VERSION}/just-${JUST_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz -C /usr/local/bin just
      fi
    - |
      # Remove source: kind: "self" — blocks CUE module cache resolution in CI
      sed -i '/^source:/d' cue.mod/module.cue
    - |
      if git clone --depth=1 https://gitlab-ci-token:${CI_JOB_TOKEN}@git.example.com/apercue/apercue.git /tmp/apercue 2>/dev/null; then
        mkdir -p cue.mod/pkg/apercue.ca@v0
        cp -r /tmp/apercue/vocab cue.mod/pkg/apercue.ca@v0/
        cp -r /tmp/apercue/patterns cue.mod/pkg/apercue.ca@v0/
        [ -d /tmp/apercue/charter ] && cp -r /tmp/apercue/charter cue.mod/pkg/apercue.ca@v0/
        [ -d /tmp/apercue/views ] && cp -r /tmp/apercue/views cue.mod/pkg/apercue.ca@v0/
        echo "Refreshed apercue.ca dep from git"
      else
        echo "Using bundled apercue.ca dep"
      fi

validate:vocab:
  extends: .cue-just-setup
  stage: validate
  script:
    - cue vet ./vocab/ ./patterns/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

validate:examples:
  extends: .cue-just-setup
  stage: validate
  script:
    - just examples
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

validate:providers:
  extends: .cue-just-setup
  stage: validate
  script:
    - just providers
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

validate:charter:
  extends: .cue-just-setup
  stage: validate
  script:
    - just charter
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

validate:kb:
  extends: .cue-just-setup
  stage: validate
  script:
    - just kb
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:full:
  extends: .cue-just-setup
  stage: test
  script:
    - just test
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
